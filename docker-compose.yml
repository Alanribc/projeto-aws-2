services:

  postgres:
    image: postgres:16
    container_name: postgres-cloud

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: cloud_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: backend-api

    ports:
      - "3000:3000"

    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: admin
      DB_PASSWORD: admin123
      DB_NAME: cloud_db

    depends_on:
      - postgres

  frontend:
    build: ./frontend
    container_name: frontend-app

    ports:
      - "8080:80"

    depends_on:
      - backend

volumes:
  postgres_data: